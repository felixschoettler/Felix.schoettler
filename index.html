<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felix Schöttler</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .video-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .video-bg video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0.2;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1;
  }
  .page {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .photo-wrap {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    overflow: hidden;
    margin-bottom: 2rem;
    border: 1px solid rgba(255,255,255,0.12);
    outline: 1px solid rgba(255,255,255,0.04);
    outline-offset: 4px;
  }
  .photo-wrap img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .name {
    font-size: 1.75rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 0.3rem;
  }
  .name-zh {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.25em;
    margin-bottom: 2rem;
  }
  .divider {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
    margin-bottom: 2rem;
  }
  .locations {
    display: flex;
    gap: 2rem;
    margin-bottom: 2.5rem;
    align-items: flex-start;
    justify-content: center;
  }
  .location-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .location-en {
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }
  .location-zh {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em;
    font-family: 'PingFang SC', 'Noto Serif SC', serif;
  }
  .location-sep {
    color: rgba(255,255,255,0.1);
    font-size: 0.7rem;
    padding-top: 4px;
  }
  .contacts {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }
  .contact-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    text-decoration: none;
    padding: 13px 24px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 2px;
    background: rgba(255,255,255,0.03);
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    backdrop-filter: blur(8px);
  }
  .contact-link:hover {
    border-color: rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.07);
    color: #fff;
  }
  .contact-link svg { opacity: 0.4; flex-shrink: 0; }
  .contact-link:hover svg { opacity: 0.7; }
  .footer {
    margin-top: 3rem;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);
  }
</style>
</head>
<body>

<div class="video-bg">
  <video autoplay muted loop playsinline>
    <source src="Shanghai.mp4" type="video/mp4">
  </video>
</div>
<div class="overlay"></div>

<main class="page">
  <div class="photo-wrap">
    <img src="felix1.jpeg" alt="Felix Schöttler">
  </div>

  <h1 class="name">Felix Schöttler</h1>
  <p class="name-zh">谢飞临</p>

  <div class="divider"></div>

  <div class="locations">
    <div class="location-item">
      <span class="location-en">Munich</span>
      <span class="location-zh">慕尼黑</span>
    </div>
    <span class="location-sep">·</span>
    <div class="location-item">
      <span class="location-en">Hong Kong</span>
      <span class="location-zh">香港</span>
    </div>
    <span class="location-sep">·</span>
    <div class="location-item">
      <span class="location-en">Shanghai</span>
      <span class="location-zh">上海</span>
    </div>
  </div>

  <div class="contacts">
    <a class="contact-link" href="mailto:felix@felixschoettler.com">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="4" width="16" height="12" rx="2"/>
        <path d="M2 7l8 5 8-5"/>
      </svg>
      felix@felixschoettler.com
    </a>
    <a class="contact-link" href="tel:+491736866398">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 2a1 1 0 0 0-1 1v1.5C3 12.5 7.5 17 14.5 17H16a1 1 0 0 0 1-1v-2.5a.5.5 0 0 0-.5-.5h-2a.5.5 0 0 0-.5.5v.3a.2.2 0 0 1-.25.19C10.5 13 7 9.5 6.5 6.75A.2.2 0 0 1 6.7 6.5H7a.5.5 0 0 0 .5-.5V4a.5.5 0 0 0-.5-.5H4.5"/>
      </svg>
      +49 173 6866398
    </a>
  </div>

  <p class="footer">© 2026</p>
</main>
</body>
</html>
